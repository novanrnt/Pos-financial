name: Vercel Deploy (Prisma Generate)

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  # Deploy ke Vercel biasanya otomatis kalau repo sudah terhubung di Vercel.
  # Job ini hanya memastikan build sukses. Jika build gagal, commit tidak bisa dipakai untuk deploy.
